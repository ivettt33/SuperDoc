
stages:
  - build
  - test
  - sonarqube
  - docker
  - deploy


.setup_java: &setup_java
  before_script:
    - source ci/setup-java.sh
    - export GRADLE_OPTS="-Dorg.gradle.daemon=false -Dorg.gradle.workers.max=2 -Xmx2g"

build:backend:
  stage: build
  <<: *setup_java
  script:
    - cd backend
    - chmod +x ./gradlew
    - ./gradlew clean assemble -x test --no-daemon
  artifacts:
    expire_in: 7 days
    paths:
      - backend/**/build/libs/*.jar
  cache:
    key: gradle-cache
    paths:
      - backend/.gradle/
  only:
    - main
    - develop
    - feature/backend-fix
    - /^feature\/.*$/
    - merge_requests

build:frontend:
  stage: build
  image: node:20-alpine
  script:
    - cd frontend
    - npm ci
    - npm run build
  artifacts:
    expire_in: 7 days
    paths:
      - frontend/dist/
  cache:
    key: npm-cache
    paths:
      - frontend/node_modules/
  only:
    - main
    - develop
    - feature/backend-fix
    - /^feature\/.*$/
    - merge_requests


test:unit:
  stage: test
  <<: *setup_java
  needs: ["build:backend"]
  script:
    - cd backend
    - ./gradlew test jacocoTestReport --info --no-daemon
  artifacts:
    expire_in: 30 days
    paths:
      - backend/build/reports/jacoco/test/html/
      - backend/build/reports/tests/test/
    reports:
      junit: backend/build/test-results/test/TEST-*.xml
      coverage_report:
        coverage_format: cobertura
        path: backend/build/reports/jacoco/test/jacocoTestReport.xml
  cache:
    key: gradle-cache
    paths:
      - backend/.gradle/
  coverage: '/Total.*?([0-9]{1,3})%/'
  only:
    - main
    - develop
    - feature/backend-fix
    - /^feature\/.*$/
    - merge_requests

test:integration:
  stage: test
  <<: *setup_java
  needs: ["build:backend"]
  services:
    - docker:dind
  variables:
    DOCKER_TLS_CERTDIR: ""
  before_script:
    - source ci/setup-java.sh
    - export GRADLE_OPTS="-Dorg.gradle.daemon=false -Dorg.gradle.workers.max=2 -Xmx2g"
    - docker --version
  script:
    - cd backend
    - ./gradlew testIntegration --info --no-daemon
  artifacts:
    expire_in: 30 days
    paths:
      - backend/build/reports/tests/test/
    reports:
      junit: backend/build/test-results/test/TEST-*.xml
  cache:
    key: gradle-cache
    paths:
      - backend/.gradle/
  only:
    - main
    - develop
    - feature/backend-fix
    - /^feature\/.*$/
    - merge_requests

e2e:
  stage: test
  image: cypress/browsers:node20.11.1-chrome120
  services:
    - docker:26.1.3-dind

  variables:
    DOCKER_TLS_CERTDIR: ""
    CYPRESS_baseUrl: "http://localhost:5173"
    # Isolate CI/CD containers from local development containers
    COMPOSE_PROJECT_NAME: "superdoc-ci"

  script:
    # Clean up any previous CI containers (using CI-specific compose file)
    - docker compose -f docker-compose.ci.yml -p superdoc-ci down -v || true
    - |
      # Only clean up containers with CI project name to avoid affecting local dev
      docker ps -a --filter "name=superdoc-ci" --format "{{.ID}}" | xargs docker rm -f 2>/dev/null || true
      sleep 2
    # Build and start CI containers (using CI-specific compose file)
    - docker compose -f docker-compose.ci.yml -p superdoc-ci up -d --build db backend
    - sleep 10
    - cd frontend
    - npm ci
    - mkdir -p cypress/videos cypress/screenshots
    - npm run dev &
    - FRONTEND_PID=$!
    - sleep 5
    - npx cypress run --browser chrome --headless || CYPRESS_EXIT=$?
    - kill $FRONTEND_PID 2>/dev/null || true
    - cd ..
    # Clean up CI containers after tests (using CI-specific compose file)
    - docker compose -f docker-compose.ci.yml -p superdoc-ci down -v
    - exit ${CYPRESS_EXIT:-0}

  artifacts:
    when: always
    paths:
      - frontend/cypress/screenshots
      - frontend/cypress/videos
    expire_in: 7 days

  only:
    - main


sonarqube:backend:
  stage: sonarqube
  <<: *setup_java
  needs: ["test:unit"]
  services:
    - docker:dind
  variables:
    SONAR_HOST_URL: ${SONAR_HOST_URL:-https://sonarcloud.io}
    DOCKER_TLS_CERTDIR: ""
  before_script:
    - source ci/setup-java.sh
    - export GRADLE_OPTS="-Dorg.gradle.daemon=false -Dorg.gradle.workers.max=2 -Xmx2g"
    - docker --version
  script:
    - cd backend
    - |
      echo "Debug: Checking for SONAR_TOKEN..."
      if [ -z "${SONAR_TOKEN:-}" ]; then
        echo "Error: SONAR_TOKEN not set. Skipping SonarQube analysis."
        echo "Debug: Available env vars with SONAR prefix:"
        env | grep -i sonar || echo "No SONAR* variables found"
        exit 0
      fi
      if [ -z "${SONAR_ORGANIZATION:-}" ]; then
        echo "Error: SONAR_ORGANIZATION not set. Skipping SonarQube analysis."
        exit 0
      fi
      if [ -z "${SONAR_PROJECT_KEY:-}" ]; then
        echo "Error: SONAR_PROJECT_KEY not set. Skipping SonarQube analysis."
        exit 0
      fi
      echo "Running SonarQube analysis for backend..."
      echo "  Host URL: ${SONAR_HOST_URL:-https://sonarcloud.io}"
      echo "  Organization: ${SONAR_ORGANIZATION}"
      echo "  Project Key: ${SONAR_PROJECT_KEY}"
      SONAR_ARGS="-Dsonar.host.url=${SONAR_HOST_URL:-https://sonarcloud.io} -Dsonar.token=${SONAR_TOKEN} -Dsonar.organization=${SONAR_ORGANIZATION} -Dsonar.projectKey=${SONAR_PROJECT_KEY} -Dsonar.gradle.skipCompile=true"
      ./gradlew clean testAll jacocoTestReportAll sonar $SONAR_ARGS --no-daemon
  artifacts:
    expire_in: 30 days
    paths:
      - backend/build/reports/jacoco/testAll/jacocoTestReportAll.xml
      - backend/build/reports/jacoco/test/jacocoTestReport.xml
      - backend/build/test-results/test/
    reports:
      junit: backend/build/test-results/test/TEST-*.xml
  cache:
    key: gradle-cache
    paths:
      - backend/.gradle/
  allow_failure: false
  only:
    - main
    - develop
    - feature/backend-fix
    - /^feature\/.*$/
    - merge_requests

docker:build-backend:
  stage: docker
  image: docker:26.1.3
  services:
    - docker:dind
  variables:
    DOCKER_TLS_CERTDIR: ""
    DOCKER_BUILDKIT: 1
  needs: ["test:unit", "test:integration", "sonarqube:backend"]
  before_script:
    - docker --version
    - |
      if [ -z "$DOCKERHUB_USERNAME" ] || [ -z "$DOCKERHUB_TOKEN" ]; then
        echo "Error: DOCKERHUB_USERNAME or DOCKERHUB_TOKEN not set"
        exit 1
      fi
    - printf '%s\n' "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
  script:
    - cd backend
    - echo "Building backend Docker image..."
    - docker build --progress=plain --no-cache=false -t $DOCKERHUB_USERNAME/superdoc-backend:latest -t $DOCKERHUB_USERNAME/superdoc-backend:$CI_COMMIT_SHORT_SHA .
    - echo "Backend Docker image built successfully"
    - echo "Pushing backend image to Docker Hub..."
    - docker push $DOCKERHUB_USERNAME/superdoc-backend:latest
    - docker push $DOCKERHUB_USERNAME/superdoc-backend:$CI_COMMIT_SHORT_SHA
    - echo "Backend image pushed successfully"
  artifacts:
    expire_in: 1 day
    paths:
      - backend/Dockerfile
  only:
    - main
    - develop
    - feature/backend-fix
    - /^feature\/.*$/
    - merge_requests

docker:build-frontend:
  stage: docker
  image: docker:26.1.3
  services:
    - docker:dind
  variables:
    DOCKER_TLS_CERTDIR: ""
    DOCKER_BUILDKIT: 1
  needs: ["build:frontend"]
  before_script:
    - docker --version
    - |
      if [ -z "$DOCKERHUB_USERNAME" ] || [ -z "$DOCKERHUB_TOKEN" ]; then
        echo "Error: DOCKERHUB_USERNAME or DOCKERHUB_TOKEN not set"
        exit 1
      fi
    - printf '%s\n' "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
  script:
    - cd frontend
    - echo "Building frontend Docker image..."
    - docker build --progress=plain --no-cache=false -t $DOCKERHUB_USERNAME/superdoc-frontend:latest -t $DOCKERHUB_USERNAME/superdoc-frontend:$CI_COMMIT_SHORT_SHA .
    - echo "Frontend Docker image built successfully"
    - echo "Pushing frontend image to Docker Hub..."
    - docker push $DOCKERHUB_USERNAME/superdoc-frontend:latest
    - docker push $DOCKERHUB_USERNAME/superdoc-frontend:$CI_COMMIT_SHORT_SHA
    - echo "Frontend image pushed successfully"
  artifacts:
    expire_in: 1 day
    paths:
      - frontend/Dockerfile
  only:
    - main
    - develop
    - feature/backend-fix
    - /^feature\/.*$/
    - merge_requests


deploy:verify-images:
  stage: deploy
  image: docker:26.1.3
  services:
    - docker:dind
  variables:
    DOCKER_TLS_CERTDIR: ""
  needs: ["docker:build-backend", "docker:build-frontend"]
  before_script:
    - docker --version
    - |
      if [ -z "$DOCKERHUB_USERNAME" ] || [ -z "$DOCKERHUB_TOKEN" ]; then
        echo "Error: DOCKERHUB_USERNAME or DOCKERHUB_TOKEN not set"
        exit 1
      fi
    - printf '%s\n' "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
  script:
    - |
      echo "Verifying Docker images are available in Docker Hub..."
      echo "Checking backend images:"
      docker pull $DOCKERHUB_USERNAME/superdoc-backend:latest || echo "Backend latest not found"
      docker pull $DOCKERHUB_USERNAME/superdoc-backend:$CI_COMMIT_SHORT_SHA || echo "Backend $CI_COMMIT_SHORT_SHA not found"
      echo "Checking frontend images:"
      docker pull $DOCKERHUB_USERNAME/superdoc-frontend:latest || echo "Frontend latest not found"
      docker pull $DOCKERHUB_USERNAME/superdoc-frontend:$CI_COMMIT_SHORT_SHA || echo "Frontend $CI_COMMIT_SHORT_SHA not found"
      echo "Deployment verification complete!"
      echo "Images should be available at:"
      echo "  - $DOCKERHUB_USERNAME/superdoc-backend:latest"
      echo "  - $DOCKERHUB_USERNAME/superdoc-backend:$CI_COMMIT_SHORT_SHA"
      echo "  - $DOCKERHUB_USERNAME/superdoc-frontend:latest"
      echo "  - $DOCKERHUB_USERNAME/superdoc-frontend:$CI_COMMIT_SHORT_SHA"
  allow_failure: false
  only:
    - main
    - develop
