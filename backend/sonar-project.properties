# SonarCloud Configuration
# For local development, override these in environment variables or build.gradle
# For CI/CD, set SONAR_ORGANIZATION, SONAR_PROJECT_KEY, and SONAR_TOKEN in GitLab CI/CD variables

sonar.projectKey=superdoc-backend
sonar.projectName=SuperDoc Backend
sonar.projectVersion=0.0.1-SNAPSHOT

# SonarCloud organization (set via SONAR_ORGANIZATION env var in CI/CD)
# sonar.organization=your-org-key

sonar.sources=src/main/java
sonar.tests=src/test/java
sonar.java.source=21
sonar.java.target=21

sonar.sourceEncoding=UTF-8
sonar.junit.reportPaths=build/test-results/test
# Use jacocoTestReportAll.xml which includes both unit and integration test coverage
sonar.coverage.jacoco.xmlReportPaths=build/reports/jacoco/testAll/jacocoTestReportAll.xml

sonar.exclusions=**/entities/**,**/dto/**,**/config/**,**/domain/**

# SonarCloud URL (defaults to https://sonarcloud.io)
sonar.host.url=https://sonarcloud.io
# Token is set via SONAR_TOKEN environment variable (never commit tokens!)

