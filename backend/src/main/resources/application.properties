spring.datasource.url=jdbc:postgresql://localhost:5433/superdocdb?currentSchema=public&options=-c search_path=public
spring.datasource.username=superdoc
spring.datasource.password=superdoc_pw

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.default_schema=public
spring.jpa.show-sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway configuration - Flyway handles ALL database migrations
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# JWT
jwt.secret=REPLACE_WITH_64_CHAR_SECRET_SUPERDOC_2025_change_me_change_me_change
jwt.expirationMinutes=120

# Mail (example for Gmail SMTP; replace accordingly)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# App public URL for reset links (frontend)
app.publicUrl=http://localhost:5173

# File upload configuration
app.upload.path=uploads
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Disable static resource handling for API paths
spring.web.resources.add-mappings=false

# SendGrid (if provided, will be used instead of SMTP)
sendgrid.apiKey=${SENDGRID_API_KEY:}
mail.from=${MAIL_FROM:no-reply@superdoc.local}

# OpenAI API Configuration
openai.api.key=YOUR_API_KEY_REMOVED
openai.api.model=gpt-3.5-turbo
openai.api.max-tokens=500
