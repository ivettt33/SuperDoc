services:
 
  db:
    image: postgres:15-alpine
    container_name: superdoc-db-local
    environment:
      POSTGRES_DB: superdocdb
      POSTGRES_USER: superdoc
      POSTGRES_PASSWORD: superdoc_pw
    ports:
      - "5433:5432"  
    volumes:
      - postgres_data_local:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U superdoc"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - superdoc-local-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: superdoc-backend-local
    ports:
      - "8080:8080"
    environment:
      # Database connection 
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/superdocdb
      SPRING_DATASOURCE_USERNAME: superdoc
      SPRING_DATASOURCE_PASSWORD: superdoc_pw
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_FLYWAY_ENABLED: false
      
      # App configuration
      APP_PUBLIC_URL: http://localhost:3000
      
      # JWT Secret 
      JWT_SECRET: ${JWT_SECRET:-REPLACE_WITH_64_CHAR_SECRET_SUPERDOC_2025_change_me_change_me_change}
      
      # Mail configuration
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
      MAIL_FROM: ${MAIL_FROM:-no-reply@superdoc.local}
    volumes:
      # Mount uploads directory so files persist
      - ./backend/uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    networks:
      - superdoc-local-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: superdoc-frontend-local
    ports:
      - "3000:80" 
    depends_on:
      backend:
        condition: service_started
    networks:
      - superdoc-local-network
    restart: unless-stopped

  sonarqube:
    image: sonarqube:community
    container_name: superdoc-sonarqube-local
    ports:
      - "9000:9000"
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonarqube-db:5432/sonar
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: sonar
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
    depends_on:
      sonarqube-db:
        condition: service_healthy
    networks:
      - superdoc-local-network
    restart: unless-stopped

  sonarqube-db:
    image: postgres:15-alpine
    container_name: superdoc-sonarqube-db-local
    environment:
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: sonar
      POSTGRES_DB: sonar
    volumes:
      - sonarqube_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sonar"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - superdoc-local-network

networks:
  superdoc-local-network:
    driver: bridge

volumes:
  postgres_data_local:
    driver: local
  sonarqube_data:
    driver: local
  sonarqube_extensions:
    driver: local
  sonarqube_logs:
    driver: local
  sonarqube_db_data:
    driver: local

