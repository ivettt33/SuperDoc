version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: superdoc-postgres
    environment:
      POSTGRES_DB: superdocdb
      POSTGRES_USER: superdoc
      POSTGRES_PASSWORD: superdoc_pw
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U superdoc -d superdocdb"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - superdoc-network

  backend:
    image: ${DOCKERHUB_USERNAME:-ivettt}/superdoc-backend:latest
    container_name: superdoc-backend
    ports:
      - "8080:8080"
    environment:
      # Database connection
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/superdocdb
      SPRING_DATASOURCE_USERNAME: superdoc
      SPRING_DATASOURCE_PASSWORD: superdoc_pw
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      SPRING_FLYWAY_ENABLED: true
      SPRING_FLYWAY_BASELINE_ON_MIGRATE: "true"
      
      # App configuration
      APP_PUBLIC_URL: ${APP_PUBLIC_URL:-http://localhost:3000}
      
      # JWT Secret - Spring Boot relaxed binding maps JWT_SECRET to jwt.secret
      # Also set explicitly via SPRING_APPLICATION_JSON for reliability
      JWT_SECRET: ${JWT_SECRET:-REPLACE_WITH_64_CHAR_SECRET_SUPERDOC_2025_change_me_change_me_change}
      SPRING_APPLICATION_JSON: '{"jwt":{"secret":"REPLACE_WITH_64_CHAR_SECRET_SUPERDOC_2025_change_me_change_me_change"}}'
      
      # Mail configuration
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY}
      MAIL_FROM: ${MAIL_FROM:-no-reply@superdoc.com}
    volumes:
      - backend_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - superdoc-network
    restart: unless-stopped

  frontend:
    image: ${DOCKERHUB_USERNAME:-ivettt}/superdoc-frontend:latest
    container_name: superdoc-frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_started
    networks:
      - superdoc-network
    restart: unless-stopped

networks:
  superdoc-network:
    driver: bridge

volumes:
  postgres_data:
  backend_uploads:



