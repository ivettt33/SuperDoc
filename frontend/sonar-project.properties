# SonarCloud Configuration for Frontend
# For CI/CD, set SONAR_FRONTEND_PROJECT_KEY in GitLab CI/CD variables
# Format: sonar.projectKey=your-org-key_superdoc-frontend

sonar.projectKey=${SONAR_PROJECT_KEY_FRONTEND:-superdoc-frontend}
sonar.projectName=SuperDoc Frontend
sonar.projectVersion=0.0.1-SNAPSHOT

sonar.sources=src
sonar.sourceEncoding=UTF-8
sonar.exclusions=**/node_modules/**,**/dist/**,**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx

# TypeScript/JavaScript configuration
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.lcov.reportPaths=coverage/lcov.info

# Language settings
sonar.javascript.file.suffixes=.js,.jsx
sonar.typescript.file.suffixes=.ts,.tsx

